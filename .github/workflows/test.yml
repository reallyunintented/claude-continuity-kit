name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify jq is available
        run: jq --version

      - name: Make scripts executable
        run: chmod +x ./test.sh ./hooks/memory-guard.sh

      - name: Run test suite
        run: ./test.sh
